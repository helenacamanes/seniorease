name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    name: Testes e Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências (todos os workspaces)
        run: npm install

      - name: Rodar testes unitários (core-domain)
        run: npm run test --workspace=@seniorease/domain

      - name: Rodar lint do Web
        run: npm run lint --workspace=seniorease-web
        continue-on-error: true
